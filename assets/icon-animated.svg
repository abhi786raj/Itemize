<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Template loading">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="128" y1="96" x2="320" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 1.1s linear infinite;
    }

    .card {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .line-1 { animation: shimmer 1.6s ease-in-out infinite; }
    .line-2 { animation: shimmer 1.6s ease-in-out 0.2s infinite; }
    .line-3 { animation: shimmer 1.6s ease-in-out 0.4s infinite; }
    .line-4 { animation: shimmer 1.6s ease-in-out 0.6s infinite; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.97); opacity: 0.92; }
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
  </style>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="72" y="72" width="368" height="200" rx="100" fill="url(#shine)"/>

  <circle
    class="ring"
    cx="256"
    cy="256"
    r="228"
    fill="none"
    stroke="#ffffff"
    stroke-width="14"
    stroke-linecap="round"
    stroke-dasharray="220 120"
    opacity="0.55"
  />

  <g class="card">
    <rect x="148" y="124" width="216" height="264" rx="28" fill="#ffffff"/>
    <rect x="188" y="188" width="136" height="22" rx="11" fill="#4f46e5"/>
    <rect class="line-1" x="188" y="236" width="104" height="16" rx="8" fill="#6366f1"/>
    <rect class="line-2" x="188" y="272" width="120" height="16" rx="8" fill="#6366f1"/>
    <rect class="line-3" x="188" y="308" width="88" height="16" rx="8" fill="#6366f1"/>
    <rect class="line-4" x="188" y="344" width="108" height="16" rx="8" fill="#6366f1"/>
  </g>
</svg>
